<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // 1. 사장님의 Gist Raw 텍스트 주소
        const gistUrl = "https://gist.githubusercontent.com/fooddelivery25/36d3154012fd8f15d8d7754b003f88a3/raw/current_url.txt";

        // 2. 페이지가 열리자마자 Gist에서 최신 Cloudflare 주소를 읽어옵니다.
        fetch(gistUrl)
            .then(response => {
                if (!response.ok) throw new Error("네트워크 응답 실패");
                return response.text();
            })
            .then(baseUrl => {
                // 텍스트 파일 안의 불필요한 공백이나 줄바꿈을 제거합니다.
                const cleanBaseUrl = baseUrl.trim(); 
                
                // 3. 읽어온 Cloudflare 주소 뒤에 최종 목적지(/deliverydb/signup/withdraw.html)를 붙여서 강제 이동시킵니다.
                window.location.href = cleanBaseUrl + "/deliverydb/signup/withdraw.html";
            })
            .catch(error => {
                console.error("주소 연결 실패:", error);
                document.body.innerHTML = "<p style='text-align:center; padding-top:50px; color:#ff4444;'>서버 연결에 실패했습니다. 잠시 후 다시 시도해 주세요.</p>";
            });
    </script>
</head>
<body>
    <p style="text-align: center; padding-top: 50px; font-family: sans-serif; color: #666;">
        안전한 보안 서버로 연결 중입니다. 잠시만 기다려 주세요...
    </p>
</body>
</html>
