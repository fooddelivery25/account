
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 탈퇴 페이지로 이동 중</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .loader-container { text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff4444; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p id="status">서버 연결 정보를 확인 중입니다...</p>
    </div>

    <script>
        // 질문자님의 Gist Raw 주소
        const GIST_URL = "https://gist.githubusercontent.com/fooddelivery25/36d3154012fd8f15d8d7754b003f88a3/raw/current_url.txt";
        
        // 실제 탈퇴 페이지 경로
        const WITHDRAW_PATH = "/deliverydb/signup/withdraw.html";

        async function doRedirect() {
            try {
                // 캐시 방지를 위해 타임스탬프 추가 (Gist 주소가 바로 반영되도록 함)
                const response = await fetch(GIST_URL + "?t=" + new Date().getTime());
                
                if (!response.ok) throw new Error("주소 획득 실패");

                let targetUrl = await response.text();
                targetUrl = targetUrl.trim(); // 혹시 모를 공백 제거

                // 마지막에 /가 있다면 제거해서 경로 중첩 방지
                if (targetUrl.endsWith('/')) {
                    targetUrl = targetUrl.slice(0, -1);
                }

                // 최종 이동
                location.href = targetUrl + WITHDRAW_PATH;

            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "서버 주소를 불러오지 못했습니다. 잠시 후 다시 접속해 주세요.";
            }
        }

        // 실행
        doRedirect();
    </script>
</body>
</html>
